services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - backend_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
